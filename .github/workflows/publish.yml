name: Publish to npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish frontend-sdk to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build shared package
        run: bun run build:shared

      - name: Build frontend-sdk
        run: bun run build:frontend

      # npm trusted publishing uses OIDC — no NPM_TOKEN needed.
      # npm CLI >= 11.5.1 auto-detects the OIDC environment and exchanges
      # the GitHub-issued ID token for a short-lived npm publish token.
      # Provenance attestations are generated automatically.
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/frontend-sdk
